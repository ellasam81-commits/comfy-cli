    StabilityImageGenerationSD3_Request:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 10000
          description:
            "What you wish to see in the output image. A strong, descriptive
            prompt that clearly defines

            elements, colors, and subjects will lead to better results."
        mode:
          type: string
          enum:
            - text-to-image
            - image-to-image
          default: text-to-image
          description:
            "Controls whether this is a text-to-image or image-to-image
            generation, which affects which parameters are required:

            - **text-to-image** requires only the `prompt` parameter

            - **image-to-image** requires the `prompt`, `image`, and `strength` parameters"
          title: GenerationMode
        image:
          type: string
          description:
            "The image to use as the starting point for the generation.\n\
            \nSupported formats:\n\n\n\n  - jpeg\n  - png\n  - webp\n\nSupported dimensions:\n\
            \n\n\n  - Every side must be at least 64 pixels\n\n> **Important:** This\
            \ parameter is only valid for **image-to-image** requests."
          format: binary
        strength:
          type: number
          minimum: 0
          maximum: 1
          description:
            "Sometimes referred to as _denoising_, this parameter controls
            how much influence the

            `image` parameter has on the generated image.  A value of 0 would yield
            an image that

            is identical to the input.  A value of 1 would be as if you passed in
            no image at all.


            > **Important:** This parameter is only valid for **image-to-image** requests."
        aspect_ratio:
          type: string
          enum:
            - "21:9"
            - "16:9"
            - "3:2"
            - "5:4"
            - "1:1"
            - "4:5"
            - "2:3"
            - "9:16"
            - "9:21"
          default: "1:1"
          description:
            "Controls the aspect ratio of the generated image. Defaults
            to 1:1.


            > **Important:** This parameter is only valid for **text-to-image** requests."
        model:
          type: string
          enum:
            - sd3.5-large
            - sd3.5-large-turbo
            - sd3.5-medium
          default: sd3.5-large
          description:
            "The model to use for generation.\n\n- `sd3.5-large` requires\
            \ 6.5 credits per generation\n- `sd3.5-large-turbo` requires 4 credits\
            \ per generation\n- `sd3.5-medium` requires 3.5 credits per generation\n\
            - As of the April 17, 2025, `sd3-large`, `sd3-large-turbo` and `sd3-medium`\n\
            \n\n\n  are re-routed to their `sd3.5-[model version]` equivalent, at\
            \ the same price."
        seed:
          type: number
          minimum: 0
          maximum: 4294967294
          default: 0
          description:
            A specific value that is used to guide the 'randomness' of
            the generation. (Omit this parameter or pass `0` to use a random seed.)
        output_format:
          type: string
          enum:
            - png
            - jpeg
          default: png
          description: Dictates the `content-type` of the generated image.
        style_preset:
          type: string
          enum:
            - enhance
            - anime
            - photographic
            - digital-art
            - comic-book
            - fantasy-art
            - line-art
            - analog-film
            - neon-punk
            - isometric
            - low-poly
            - origami
            - modeling-compound
            - cinematic
            - 3d-model
            - pixel-art
            - tile-texture
          description: Guides the image model towards a particular style.
        negative_prompt:
          type: string
          maxLength: 10000
          description:
            "Keywords of what you **do not** wish to see in the output
            image.

            This is an advanced feature."
        cfg_scale:
          type: number
          minimum: 1
          maximum: 10
          description:
            How strictly the diffusion process adheres to the prompt text
            (higher values keep your image closer to your prompt). The _Large_ and
            _Medium_ models use a default of `4`. The _Turbo_ model uses a default
            of `1`.
      required:
        - prompt
