        width:
          type: integer
          description: Width of the video in pixels
          example: 1920
        height:
          type: integer
          description: Height of the video in pixels
          example: 1080
    TopazVideoOutputResolution:
      type: object
      required:
        - width
        - height
      properties:
        width:
          type: integer
          description: Desired output width in pixels
          example: 3840
        height:
          type: integer
          description: Desired output height in pixels
          example: 2160
    TopazVideoEnhancementFilter:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          description: Short code name for AI model
          enum:
            - aaa-9
            - ahq-12
            - alq-13
            - alqs-2
            - amq-13
            - amqs-2
            - ddv-3
            - dtd-4
            - dtds-2
            - dtv-4
            - dtvs-2
            - gcg-5
            - ghq-5
            - iris-2
            - iris-3
            - nxf-1
            - nyx-3
            - prob-4
            - rhea-1
            - rxl-1
            - thd-3
            - thf-4
            - thm-2
            - slf-1  # Starlight Fast
            - slc-1  # Starlight Creative
          example: prob-4
        videoType:
          type: string
          enum:
            - Progressive
            - Interlaced
            - ProgressiveInterlaced
          description: Frame/field type of the video
          example: Progressive
        auto:
          type: string
          enum:
            - Auto
            - Manual
            - Relative
          description: Parameter mode of the selected model
          example: Auto
        fieldOrder:
          type: string
          enum:
            - TopFirst
            - BottomFirst
            - Auto
          description: Optional specification of field order for interlaced input videos
          example: Auto
        focusFixLevel:
          type: string
          enum:
            - None
            - Normal
            - Strong
          description: Downscales video input for stronger correction of blurred subjects
          example: Normal
        compression:
          type: number
          minimum: -1
          maximum: 1
          description: Adjust strength of compression recovery
          example: 0.1
        details:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of detail reconstruction
          example: 0.2
        prenoise:
          type: number
          minimum: 0
          maximum: 0.1
          description: Adds noise to input to reduce over-smoothing
          example: 0.01
        noise:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of noise reduction
          example: 0.3
        halo:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of halo reduction
          example: 0.4
        preblur:
          type: number
          minimum: -1
          maximum: 1
          description: Adjust anti-aliasing and deblurring strength
          example: 0.5
        blur:
          type: number
          minimum: -1
          maximum: 1
          description: Amount of sharpness applied
          example: 0.6
        grain:
          type: number
          minimum: 0
          maximum: 0.1
          description: Adds grain after AI model processing
          example: 0.02
        grainSize:
          type: number
          minimum: 0
          maximum: 5
          description: Size of generated grain
          example: 1
        recoverOriginalDetailValue:
          type: number
          minimum: 0
          maximum: 1
          description: Reintroduce source details into the output video
          example: 0.7
        creativity:
          type: string
          enum:
            - low
            - high
          description: Creativity level for Starlight Creative (slc-1) only
        isOptimizedMode:
          type: boolean
          description: Set to true for Starlight Creative (slc-1) only
    TopazVideoFrameInterpolationFilter:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          description: Short code name for AI model
          enum:
            - aion-1
            - apf-2
            - apo-8
            - chf-3
            - chr-2
          example: apo-8
        slowmo:
          type: number
          minimum: 1
          maximum: 16
          description: Slow motion factor applied to input video
          example: 2
        fps:
          type: number
          minimum: 15
          maximum: 240
          description: Output frame rate, does not increase duration
          example: 60
        duplicate:
          type: boolean
          description: Analyze input for duplicate frames and remove them
          example: true
        duplicateThreshold:
          type: number
          minimum: 0.001
          maximum: 0.1
          description: Sensitivity of detection for duplicate frames
          example: 0.01
    TopazCombinedCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/TopazCreateRequestVideoSchema'
        - $ref: '#/components/schemas/TopazCreateRequestImageSequenceSchema'
    TopazCreateRequestVideoSchema:
      title: Video AI
      type: object
      required:
        - source
        - filters
        - output
      properties:
        source:
          type: object
          description: Source details for the video
          required:
            - container
            - size
            - duration
            - frameCount
            - frameRate
            - resolution
          properties:
            container:
              type: string
              enum:
                - mp4
                - mov
                - mkv
              description: The container format of the video file
              example: mp4
            size:
              type: integer
              description: Size of the video file in bytes
              example: 123456000
            duration:
              type: number
              description: Duration of the video file in seconds
              example: 600
            frameCount:
              type: number
              description: Total number of frames in the video
              example: 18000
            frameRate:
              type: number
              description: Frame rate of the video
              example: 30
            resolution:
              type: object
              description: Resolution details of the video
              required:
                - width
                - height
              properties:
                width:
                  type: integer
                  description: Width of the video in pixels
                  example: 1920
                height:
                  type: integer
                  description: Height of the video in pixels
                  example: 1080
            external:
              $ref: '#/components/schemas/TopazExternalStorage'
        filters:
          $ref: '#/components/schemas/TopazInputFilters'
        output:
          $ref: '#/components/schemas/TopazOutputInformationVideo'
        destination:
          type: object
          properties:
            external:
              $ref: '#/components/schemas/TopazExternalStorage'
        overrides:
          type: object
          properties:
            isPaidDiffusion:
              type: boolean
    TopazCreateRequestImageSequenceSchema:
      title: Image Sequence
      type: object
      required:
        - source
        - filters
        - output
        - destination
      properties:
        source:
          type: object
          description: Source details for the video
          required:
            - container
            - frameCount
            - frameRate
            - resolution
            - external
          properties:
            container:
              type: string
              enum:
                - DPX
                - EXR
                - JPEG
                - PNG
                - TIFF
              description: The container format of the image files
              example: TIFF
            frameCount:
              type: number
              description: Total number of frames in the video, in this case, equal to the number of image files.
              example: 18000
            frameRate:
              type: number
              description: Frame rate of the video
              example: 30
            resolution:
              type: object
              description: Resolution details of the image
              required:
                - width
                - height
              properties:
                width:
                  type: integer
                  description: Width of the image in pixels
                  example: 1920
                height:
                  type: integer
                  description: Height of the image in pixels
                  example: 1080
            startNumber:
              type: integer
              description: Optional starting frame number for image sequences
              example: 120
            endNumber:
              type: integer
              description: Optional ending frame number for image sequences
              example: 120
            external:
              $ref: '#/components/schemas/TopazExternalStorage'
        filters:
          $ref: '#/components/schemas/TopazInputFilters'
        output:
          $ref: '#/components/schemas/TopazOutputInformationImageSequence'
        destination:
          type: object
          properties:
            external:
              $ref: '#/components/schemas/TopazExternalStorage'
    TopazExternalStorage:
      type: object
      required:
        - provider
        - credentials
        - bucketName
        - key
      properties:
        provider:
          type: string
          enum: [s3]
          example: s3
        credentials:
          $ref: '#/components/schemas/TopazCredentialsS3'
        bucketName:
          type: string
          example: galaxies
        key:
          type: string
          description: |
            The example includes the standard specifier for image sequence requests, with optional directory path. It must begin with "%" and end with the integer specifier "d". The "0" in the example indicates left-padding with zeroes, and "6" indicates the number of digits in the file name.
            Keys for video requests must be valid characters supported by S3.
          example: milky_way/%06d.tiff
    TopazCredentialsS3:
      type: object
      required:
        - roleArn
        - externalId
      properties:
        roleArn:
          type: string
          description: AWS ARN of the role to assume
          example: arn:aws:iam::123456789:role/topazlabs
        externalId:
          type: string
          description: Kind of like a secret string for extra layer of security
          example: MSTnuGztXtTU25XKjVfMJCsujv6VtAGtv1TGSjtOL6M=
    TopazInputFilters:
      type: array
      description: Array of EnhancementFilter or FrameInterpolationFilter objects
      items:
        anyOf:
          - $ref: '#/components/schemas/TopazVideoEnhancementFilter'
          - $ref: '#/components/schemas/TopazVideoFrameInterpolationFilter'
      example:
        - model: prob-4
          videoType: Progressive
          auto: Auto
          fieldOrder: Auto
          focusFixLevel: Normal
          compression: 0.1
          details: 0.2
          prenoise: 0.01
          noise: 0.3
          halo: 0.4
          preblur: 0.5
          blur: 0.6
          grain: 0.02
          grainSize: 1
          recoverOriginalDetailValue: 0.7
        - model: apo-8
          slowmo: 2
          fps: 60
          duplicate: true
          duplicateThreshold: 0.01
    TopazOutputInformationVideo:
      type: object
      required:
        - resolution
        - frameRate
        - audioCodec
        - audioTransfer
      properties:
        resolution:
          type: object
          description: Desired output resolution
          required:
            - width
            - height
          properties:
            width:
              type: integer
              description: Width in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>16384</td> <td>8192</td> </tr> </table>
              example: 7680
            height:
              type: integer
              description: Height in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>8704</td> <td>8192</td> </tr> </table>
              example: 4320
        frameRate:
          type: number
          description: Frame rate
          example: 30
        audioBitrate:
          type: string
          description: Audio bitrate, if audioTransfer is Copy or Convert. Default values for the codec are used if not provided.
          example: "320"
        audioCodec:
          type: string
          enum: [AAC, AC3, PCM]
          description: __Required if audioTransfer is Copy or Convert.__
          example: AAC
        audioTransfer:
          type: string
          enum: [Copy, Convert, None]
          example: Copy
        codecId:
          type: string
          description: Video codec ID, if known. Defaults to videoEncoder.
          example: h265-main-win-nvidia
        videoEncoder:
          type: string
          enum:
            - AV1
            - FFV1
            - H264
            - H265
            - ProRes
            - QuickTime Animation
            - QuickTime R210
            - QuickTime V210
            - VP9
          example: H265
        videoBitrate:
          type: string
          description: __Required if dynamicCompressionLevel is not provided.__ Constant bitrate, suffixed with "k" for kilobits or "m" for megabits per second.
          example: "1k"
        dynamicCompressionLevel:
          type: string
          enum: [Low, Mid, High]
          description: __Required if videoBitrate is not provided.__ Automatic CQP selection.
          example: Mid
        videoProfile:
          type: string
          description: Codec profile specific to videoEncoder. The following are some combinations of available profiles based on the 'videoEncoder' selection <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>High</td> <td>Main, Main10</td> <td>422 Proxy, 422 LT, 422 Std, 422 HQ</td> <td>8-bit, 10-bit</td> <td>Good, Best</td> </tr> </table>
          example: Main
        cropToFit:
          type: boolean
          description: Center cropping to fit the output dimensions
          example: true
        container:
          type: string
          enum:
            - mp4
            - mov
            - mkv
          description: Desired output container
          example: mp4
    TopazOutputInformationImageSequence:
      type: object
      required:
        - resolution
        - frameRate
      properties:
        resolution:
          type: object
          description: Desired output resolution
          required:
            - width
            - height
          properties:
            width:
              type: integer
              description: Width in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>16384</td> <td>8192</td> </tr> </table>
              example: 7680
            height:
              type: integer
              description: Height in pixels. The maximum size depends on the encoder and can be referenced using the table below <table> <tr> <td>H264</td> <td>H265</td> <td>ProRes <td>AV1 <td>VP9 </tr> <tr> <td>4096</td> <td>8192</td> <td>16386</td> <td>8704</td> <td>8192</td> </tr> </table>
              example: 4320
        frameRate:
          type: number
          description: Frame rate
          example: 30
        codecId:
          type: string
          description: Video codec ID, if known. Defaults to videoEncoder.
          example: h265-main-win-nvidia
        videoEncoder:
          type: string
          enum:
            - DPX
            - EXR
            - JPEG
            - PNG
            - TIFF
          example: TIFF
        videoProfile:
          type: string
          description: Codec profile specific to videoEncoder
          example: Main
        cropToFit:
          type: boolean
          description: Center cropping to fit the output dimensions
          example: true
        container:
          type: string
          enum:
            - DPX
            - EXR
            - JPEG
            - PNG
            - TIFF
          description: Desired output container, defaults to the input container
          example: TIFF
    TopazVideoCreateRequest:
      $ref: '#/components/schemas/TopazCombinedCreateRequest'
    TopazVideoRequestEstimates:
      type: object
      description: Lower and upper bound estimates
      properties:
        cost:
          type: array
          description: Cost range in credits
          items:
            type: integer
          example: [10, 12]
        time:
          type: array
          description: Time range in seconds
          items:
            type: integer
          example: [600, 700]
    TopazVideoCreateResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
          description: Unique identifier for the video processing request
          example: "c1f96dc2-c448-00e6-82ed-14ecb6403c62"
        estimates:
          $ref: "#/components/schemas/TopazVideoRequestEstimates"
      required:
        - requestId
        - estimates
    TopazVideoAcceptResponse:
      type: object
      properties:
        uploadId:
          type: string
          description: Upload ID for completing multi-part upload
          example: "GDlWC7qIaE6okS41Xf/ktpuS5XzTRabg"
        urls:
          type: array
          items:
            type: string
          description: URLs to PUT the parts to
          example:
            - "https://videocloud.s3.amazonaws.com/source.mp4?uploadPart1"
            - "https://videocloud.s3.amazonaws.com/source.mp4?uploadPart2"
        message:
          type: string
          description: Response message
          example: "Accepted"
      required:
        - uploadId
        - urls
    TopazVideoCompleteUploadRequest:
      type: object
      required:
        - uploadResults
      properties:
        md5Hash:
          type: string
          description: MD5 hash of the source video file in hex
          example: 4d186321c1a7f0f354b297e8914ab240
        uploadResults:
          type: array
          description: An array of part number and ETag pairs of the uploaded parts. ETags are returned by S3 upon upload of the part.
          items:
            type: object
            required:
              - partNum
              - eTag
            properties:
              partNum:
                type: integer
                description: Part number of the uploaded part, starting from 1
                example: 1
              eTag:
                type: string
                description: eTag value returned by S3 upon upload of the part
                example: "d41d8cd98f00b204e9800998ecf8427e"
    TopazVideoCompleteUploadResponse:
      type: object
      properties:
        message:
          type: string
          description: Confirmation message
          example: "Processing has been queued"
      required:
        - message
    TopazVideoEnhancedDownload:
      type: object
      description: Signed download URL to the enhanced video file
      properties:
        url:
          type: string
          example: "https://videocloud.r2.cloudflarestorage.com/enhanced.mp4"
        expiresIn:
          type: integer
          description: TTL in milliseconds
          example: 86400000
        expiresAt:
          type: integer
          description: Time in milliseconds since UTC epoch
          example: 1727213400000
    TopazVideoStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - requested
            - accepted
            - initializing
            - preprocessing
            - processing
            - postprocessing
            - complete
            - canceling
            - canceled
            - failed
          description: Current status of the video processing
          example: "processing"
        progress:
          type: number
          minimum: 0
          maximum: 100
          description: Total progress percentage
          example: 82
        estimates:
          $ref: "#/components/schemas/TopazVideoRequestEstimates"
        outputSize:
          type: string
          description: Size of output video
          example: "10 GB"
        averageFps:
          type: number
          description: Average processing speed of each node
          example: 1.23
        combinedFps:
          type: number
          description: Combined processing speed of all nodes
          example: 12.34
        message:
          type: string
          example: "Processing"
        download:
          $ref: "#/components/schemas/TopazVideoEnhancedDownload"
      required:
        - status

    # Meshy API Schemas
    MeshyTextTo3DRequest:
      oneOf:
        - $ref: "#/components/schemas/MeshyTextTo3DPreviewRequest"
        - $ref: "#/components/schemas/MeshyTextTo3DRefineRequest"
      discriminator:
        propertyName: mode
        mapping:
          preview: "#/components/schemas/MeshyTextTo3DPreviewRequest"
          refine: "#/components/schemas/MeshyTextTo3DRefineRequest"

    MeshyTextTo3DPreviewRequest:
      type: object
      required:
        - mode
        - prompt
      properties:
        mode:
          type: string
          description: This field should be set to "preview" when creating a preview task.
          enum:
            - preview
        prompt:
          type: string
          description: Describe what kind of object the 3D model is. Maximum 600 characters.
          maxLength: 600
        art_style:
          $ref: "#/components/schemas/MeshyArtStyle"
        ai_model:
          $ref: "#/components/schemas/MeshyAiModel"
        topology:
          $ref: "#/components/schemas/MeshyTopology"
        target_polycount:
          type: integer
          description: Specify the target number of polygons in the generated model. Valid range is 100 to 300,000.
          minimum: 100
          maximum: 300000
          default: 30000
        should_remesh:
          type: boolean
          description: Controls whether to enable the remesh phase. When false, returns highest-precision triangular mesh.
          default: true
        symmetry_mode:
          $ref: "#/components/schemas/MeshySymmetryMode"
        pose_mode:
          $ref: "#/components/schemas/MeshyPoseMode"
        is_a_t_pose:
          type: boolean
          description: Deprecated. Use pose_mode instead. Whether to generate the model in an A/T pose.
          default: false
        moderation:
          type: boolean
          description: When true, input content will be screened for potentially harmful content.
          default: false

    MeshyTextTo3DRefineRequest:
      type: object
      required:
        - mode
        - preview_task_id
      properties:
        mode:
          type: string
          description: This field should be set to "refine" when creating a refine task.
          enum:
            - refine
        preview_task_id:
          type: string
          description: The corresponding preview task id. The status of the given preview task must be SUCCEEDED.
        enable_pbr:
          type: boolean
          description: Generate PBR Maps (metallic, roughness, normal) in addition to the base color. Note that enable_pbr should be set to false when using Sculpture style.
          default: false
        texture_prompt:
          type: string
          description: Provide an additional text prompt to guide the texturing process. Maximum 600 characters.
          maxLength: 600
        texture_image_url:
          type: string
          description: Provide a 2d image to guide the texturing process. Supports .jpg, .jpeg, .png formats or base64-encoded data URI.
        ai_model:
          $ref: "#/components/schemas/MeshyAiModel"
        moderation:
          type: boolean
          description: When true, input content will be screened for potentially harmful content.
          default: false

    MeshyArtStyle:
      type: string
      description: Describe your desired art style of the object.
      enum:
        - realistic
        - sculpture
      default: realistic

    MeshyAiModel:
      type: string
      description: ID of the model to use.
      enum:
        - meshy-5
        - latest
      default: latest

    MeshyTopology:
      type: string
      description: Specify the topology of the generated model.
      enum:
        - quad
        - triangle
      default: triangle

    MeshySymmetryMode:
      type: string
      description: Controls symmetry behavior during model generation.
      enum:
        - "off"
        - auto
        - "on"
      default: auto

    MeshyPoseMode:
      type: string
      description: Specify the pose mode for the generated model.
      enum:
        - a-pose
        - t-pose
        - ""

    MeshyTextTo3DCreateResponse:
      type: object
      properties:
        result:
          type: string
          description: The task id of the newly created Text to 3D task.
      required:
        - result

    MeshyTextTo3DTask:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the task.
        type:
          type: string
          description: Type of the Text to 3D task.
          enum:
            - text-to-3d-preview
            - text-to-3d-refine
        model_urls:
          $ref: "#/components/schemas/MeshyModelUrls"
        prompt:
          type: string
          description: The unmodified prompt that was used to create the task.
        negative_prompt:
          type: string
          description: Deprecated field maintained for backward compatibility.
        art_style:
          type: string
          description: The unmodified art_style that was used to create the preview task.
        texture_richness:
          type: string
          description: Deprecated field maintained for backward compatibility.
        texture_prompt:
          type: string
          description: Additional text prompt provided to guide the texturing process during the refine stage.
        texture_image_url:
          type: string
          description: Downloadable URL to the texture image that was used to guide the texturing process.
        thumbnail_url:
          type: string
          description: Downloadable URL to the thumbnail image of the model file.
        video_url:
          type: string
          description: Deprecated field returning the downloadable URL to the preview video.
        progress:
          type: integer
          description: Progress of the task. 0 if not started, 100 when succeeded.
          minimum: 0
          maximum: 100
        started_at:
          type: integer
          description: Timestamp of when the task was started, in milliseconds. 0 if not started.
        created_at:
          type: integer
          description: Timestamp of when the task was created, in milliseconds.
        finished_at:
          type: integer
          description: Timestamp of when the task was finished, in milliseconds. 0 if not finished.
        status:
          $ref: "#/components/schemas/MeshyTaskStatus"
        texture_urls:
          type: array
          items:
            $ref: "#/components/schemas/MeshyTextureUrls"
          description: An array of texture URL objects that are generated from the task.
        preceding_tasks:
          type: integer
          description: The count of preceding tasks. Only meaningful when status is PENDING.
        task_error:
          $ref: "#/components/schemas/MeshyTaskError"
      required:
        - id
        - status

    MeshyModelUrls:
      type: object
      description: Downloadable URLs to the textured 3D model files generated by Meshy.
      properties:
        glb:
          type: string
          description: Downloadable URL to the GLB file.
        fbx:
          type: string
          description: Downloadable URL to the FBX file.
        usdz:
          type: string
          description: Downloadable URL to the USDZ file.
        obj:
          type: string
          description: Downloadable URL to the OBJ file.
        mtl:
          type: string
          description: Downloadable URL to the MTL file.

    MeshyTaskStatus:
      type: string
      description: Status of the task.
      enum:
        - PENDING
        - IN_PROGRESS
        - SUCCEEDED
        - FAILED
        - CANCELED

    MeshyTextureUrls:
      type: object
      description: Texture URL object containing PBR maps.
      properties:
        base_color:
          type: string
          description: Downloadable URL to the base color map image.
        metallic:
          type: string
          description: Downloadable URL to the metallic map image.
        normal:
          type: string
          description: Downloadable URL to the normal map image.
        roughness:
          type: string
          description: Downloadable URL to the roughness map image.

    MeshyTaskError:
      type: object
      description: Error object that contains the error message if the task failed.
      properties:
        message:
          type: string
          description: Detailed error message.

    # Meshy Image to 3D Schemas
    MeshyImageTo3DRequest:
      type: object
      required:
        - image_url
      properties:
        image_url:
          type: string
          description: Provide an image for Meshy to use in model creation. Supports .jpg, .jpeg, .png formats or base64-encoded data URI.
        model_type:
          type: string
          description: |
            Specify the type of 3D mesh generation.
            - standard: Regular high-detail 3D mesh generation.
            - lowpoly: Generates low-poly mesh optimized for cleaner polygons.
            When lowpoly is selected, ai_model, topology, target_polycount, should_remesh, save_pre_remeshed_model are ignored.
          enum:
            - standard
            - lowpoly
          default: standard
        ai_model:
          $ref: "#/components/schemas/MeshyAiModel"
        topology:
          $ref: "#/components/schemas/MeshyTopology"
        target_polycount:
          type: integer
          description: Specify the target number of polygons in the generated model. Valid range is 100 to 300,000.
          minimum: 100
          maximum: 300000
          default: 30000
        symmetry_mode:
          $ref: "#/components/schemas/MeshySymmetryMode"
        should_remesh:
          type: boolean
          description: Controls whether to enable the remesh phase. When false, returns highest-precision triangular mesh.
          default: true
        save_pre_remeshed_model:
          type: boolean
          description: When true, stores an extra GLB file before the remesh phase completes. Only takes effect when should_remesh is true.
          default: false
        should_texture:
          type: boolean
          description: Determines if textures are generated. When false, provides a mesh without textures.
          default: true
        enable_pbr:
          type: boolean
          description: Generate PBR Maps (metallic, roughness, normal) in addition to the base color.
          default: false
        pose_mode:
          $ref: "#/components/schemas/MeshyPoseMode"
        is_a_t_pose:
          type: boolean
          description: Deprecated. Use pose_mode instead. Whether to generate the model in an A/T pose.
          default: false
        texture_prompt:
          type: string
          description: Provide a text prompt to guide the texturing process. Maximum 600 characters.
          maxLength: 600
        texture_image_url:
          type: string
          description: Provide a 2d image to guide the texturing process. Supports .jpg, .jpeg, .png formats or base64-encoded data URI.
        moderation:
          type: boolean
          description: When true, input content will be screened for potentially harmful content.
          default: false

    MeshyImageTo3DCreateResponse:
      type: object
      properties:
        result:
          type: string
          description: The task id of the newly created Image to 3D task.
      required:
        - result

    MeshyImageTo3DTask:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the task.
        type:
          type: string
          description: Type of the Image to 3D task.
          enum:
            - image-to-3d
        model_urls:
          $ref: "#/components/schemas/MeshyImageTo3DModelUrls"
        thumbnail_url:
          type: string
          description: Downloadable URL to the thumbnail image of the model file.
        texture_prompt:
          type: string
          description: The text prompt that was used to guide the texturing process.
        texture_image_url:
          type: string
          description: Downloadable URL to the texture image that was used to guide the texturing process.
        progress:
          type: integer
          description: Progress of the task. 0 if not started, 100 when succeeded.
          minimum: 0
          maximum: 100
        started_at:
          type: integer
          description: Timestamp of when the task was started, in milliseconds. 0 if not started.
        created_at:
          type: integer
          description: Timestamp of when the task was created, in milliseconds.
        expires_at:
          type: integer
          description: Timestamp of when the task result expires, in milliseconds.
        finished_at:
          type: integer
          description: Timestamp of when the task was finished, in milliseconds. 0 if not finished.
        status:
          $ref: "#/components/schemas/MeshyTaskStatus"
        texture_urls:
          type: array
          items:
            $ref: "#/components/schemas/MeshyTextureUrls"
          description: An array of texture URL objects that are generated from the task.
        preceding_tasks:
          type: integer
          description: The count of preceding tasks. Only meaningful when status is PENDING.
        task_error:
          $ref: "#/components/schemas/MeshyTaskError"
      required:
        - id
        - status

    MeshyImageTo3DModelUrls:
      type: object
      description: Downloadable URLs to the 3D model files generated by Meshy.
      properties:
        glb:
          type: string
          description: Downloadable URL to the GLB file.
        fbx:
          type: string
          description: Downloadable URL to the FBX file.
        obj:
          type: string
          description: Downloadable URL to the OBJ file.
        usdz:
          type: string
          description: Downloadable URL to the USDZ file.
        mtl:
          type: string
          description: Downloadable URL to the MTL file.
        pre_remeshed_glb:
          type: string
          description: Downloadable URL to the original GLB output before remeshing. Available only when should_remesh and save_pre_remeshed_model are both true.

