            2 - strong latency optimizations (~75% improvement)
            3 - max latency optimizations
            4 - max latency with text normalizer off (best latency but may mispronounce)
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 4
        - name: output_format
          in: query
          description: |
