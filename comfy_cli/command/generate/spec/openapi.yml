components:
  schemas:
    FreepikMagnificUpscalerCreativeRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Base64 image or URL to upscale. The resulted image can't exceed maximum allowed size of 25.3 million pixels.
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL that will receive asynchronous notifications whenever the task changes status.
          example: "https://www.example.com/webhook"
        scale_factor:
          type: string
          enum: ["2x", "4x", "8x", "16x"]
          default: "2x"
          description: Configure scale factor of the image. For higher scales, the image will take longer to process.
        optimized_for:
          type: string
          enum: [standard, soft_portraits, hard_portraits, art_n_illustration, videogame_assets, nature_n_landscapes, films_n_photography, 3d_renders, science_fiction_n_horror]
          default: standard
          description: Styles to optimize the upscale process.
        prompt:
          type: string
          description: Prompt to guide the upscale process. Reusing the same prompt for AI-generated images will improve the results.
        creativity:
          type: integer
          minimum: -10
          maximum: 10
          default: 0
          description: Increase or decrease AI's creativity. Valid values range [-10, 10].
        hdr:
          type: integer
          minimum: -10
          maximum: 10
          default: 0
          description: Increase or decrease the level of definition and detail. Valid values range [-10, 10].
        resemblance:
          type: integer
          minimum: -10
          maximum: 10
          default: 0
          description: Adjust the level of resemblance to the original image. Valid values range [-10, 10].
        fractality:
          type: integer
          minimum: -10
          maximum: 10
          default: 0
          description: Control the strength of the prompt and intricacy per square pixel. Valid values range [-10, 10].
        engine:
          type: string
          enum: [automatic, magnific_illusio, magnific_sharpy, magnific_sparkle]
          default: automatic
          description: Magnific model engines.

    FreepikTaskResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/FreepikTaskData"
    FreepikTaskData:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
          example: "046b6c7f-0b8a-43b9-b35d-6489e6daee91"
        status:
          type: string
          enum: [CREATED, IN_PROGRESS, COMPLETED, FAILED]
        generated:
          type: array
          items:
            type: string
            format: uri
          description: URLs to the generated images.
    FreepikErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    FreepikSkinEnhancerFlexibleRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Input image. Supports Base64 encoding or HTTPS URL (must be publicly accessible).
          example: "https://example.com/portrait.jpg"
        sharpen:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
          description: Sharpening intensity
        smart_grain:
          type: integer
          minimum: 0
          maximum: 100
          default: 2
          description: Smart grain intensity
        optimized_for:
          type: string
          enum: [enhance_skin, improve_lighting, enhance_everything, transform_to_real, no_make_up]
          default: enhance_skin
          description: Optimization target for flexible skin enhancer
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL for async notifications.
          example: "https://www.example.com/webhook"

    FreepikSkinEnhancerFaithfulRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Input image. Supports Base64 encoding or HTTPS URL (must be publicly accessible).
          example: "https://example.com/portrait.jpg"
        sharpen:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
          description: Sharpening intensity
        smart_grain:
          type: integer
          minimum: 0
          maximum: 100
          default: 2
          description: Smart grain intensity
        skin_detail:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
          description: Skin detail enhancement level
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL for async notifications.
          example: "https://www.example.com/webhook"

    FreepikSkinEnhancerCreativeRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Input image. Supports Base64 encoding or HTTPS URL (must be publicly accessible).
          example: "https://example.com/portrait.jpg"
        sharpen:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
          description: Sharpening intensity
        smart_grain:
          type: integer
          minimum: 0
          maximum: 100
          default: 2
          description: Smart grain intensity
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL for async notifications.
          example: "https://www.example.com/webhook"

    FreepikMagnificStyleTransferRequest:
      type: object
      required:
        - image
        - reference_image
      properties:
        image:
          type: string
          description: Base64 or URL of the image to do the style transfer
        reference_image:
          type: string
          description: Base64 or URL of the reference image for style transfer
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL for async notifications.
          example: "https://www.example.com/webhook"
        prompt:
          type: string
          description: Prompt for the AI model
        style_strength:
          type: integer
          minimum: 0
          maximum: 100
          default: 100
          description: Percentage of style strength
        structure_strength:
          type: integer
          minimum: 0
          maximum: 100
          default: 50
          description: Allows to maintain the structure of the original image
        is_portrait:
          type: boolean
          default: false
          description: Indicates whether the image should be processed as a portrait.
        portrait_style:
          type: string
          enum: [standard, pop, super_pop]
          default: standard
          description: Visual style applied to portrait images. Only used if is_portrait is true.
        portrait_beautifier:
          type: string
          enum: [beautify_face, beautify_face_max]
          description: Facial beautification on portrait images. Only used if is_portrait is true.
        flavor:
          type: string
          enum: [faithful, gen_z, psychedelia, detaily, clear, donotstyle, donotstyle_sharp]
          default: faithful
          description: Flavor of the transferring style
        engine:
          type: string
          enum: [balanced, definio, illusio, 3d_cartoon, colorful_anime, caricature, real, super_real, softy]
          default: balanced
          description: Engine preset for style transfer
        fixed_generation:
          type: boolean
          default: false
          description: When enabled, using the same settings will consistently produce the same image.

    FreepikMagnificRelightRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Base64 or URL of the image to do the relight
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL that will receive asynchronous notifications whenever the task changes status.
          example: "https://www.example.com/webhook"
        prompt:
          type: string
          description: |
            You can guide the generation process and influence the light transfer with a descriptive prompt.
            IMPORTANT: You can emphasize specific aspects of the light in your prompt by using a number in parentheses, ranging from 1 to 1.4, like "(dark scene:1.3)".
        transfer_light_from_reference_image:
          type: string
          description: Base64 or URL of the reference image for light transfer. Incompatible with 'transfer_light_from_lightmap'
        transfer_light_from_lightmap:
          type: string
          description: Base64 or URL of the lightmap for light transfer. Incompatible with 'transfer_light_from_reference_image'
        light_transfer_strength:
          type: integer
          minimum: 0
          maximum: 100
          default: 100
          description: Level of light transfer intensity. 0% keeps closest to original, 100% is maximum transfer.
        interpolate_from_original:
          type: boolean
          default: false
          description: When enabled, makes the final image interpolate from the original using the light transfer strength slider.
        change_background:
          type: boolean
          default: true
          description: When enabled, changes the background based on prompt and/or reference image. Useful for product placement and portraits.
        style:
          type: string
          enum: [standard, darker_but_realistic, clean, smooth, brighter, contrasted_n_hdr, just_composition]
          default: standard
          description: Style preset for the relight operation.
        preserve_details:
          type: boolean
          default: true
          description: Maintains texture and small details of the original image. Good for product photography, texts, etc.
        advanced_settings:
          type: object
          properties:
            whites:
              type: integer
              minimum: 0
              maximum: 100
              default: 50
              description: Adjust the level of white color in the image.
            blacks:
              type: integer
              minimum: 0
              maximum: 100
              default: 50
              description: Adjust the level of black color in the image.
            brightness:
              type: integer
              minimum: 0
              maximum: 100
              default: 50
              description: Adjust the level of brightness in the image.
            contrast:
              type: integer
              minimum: 0
              maximum: 100
              default: 50
              description: Adjust the level of contrast in the image.
            saturation:
              type: integer
              minimum: 0
              maximum: 100
              default: 50
              description: Adjust the level of saturation in the image.
            engine:
              type: string
              enum: [automatic, balanced, cool, real, illusio, fairy, colorful_anime, hard_transform, softy]
              default: automatic
              description: |
                Engine preset for relighting:
                - balanced: Well-rounded, general-purpose option
                - cool: Brighter with cooler tones
                - real: Aims to enhance photographic quality (Experimental)
                - illusio: Optimized for illustrations and drawings
                - fairy: Suited for fantasy-themed images
                - colorful_anime: Ideal for anime, cartoons, and vibrant colors
                - hard_transform: Significantly alters the original image
                - softy: Slightly softer effect, suitable for graphic designs
            transfer_light_a:
              type: string
              enum: [automatic, low, medium, normal, high, high_on_faces]
              default: automatic
              description: Adjusts the intensity of light transfer.
            transfer_light_b:
              type: string
              enum: [automatic, composition, straight, smooth_in, smooth_out, smooth_both, reverse_both, soft_in, soft_out, soft_mid, strong_mid, style_shift, strong_shift]
              default: automatic
              description: Also modifies light transfer intensity. Can be combined with transfer_light_a for varied effects.
            fixed_generation:
              type: boolean
              default: false
              description: When enabled, using the same settings will consistently produce the same image.

    FreepikMagnificUpscalerPrecisionV2Request:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: |
            Source image to upscale. Accepts either:
            - A publicly accessible HTTPS URL pointing to the image
            - A base64-encoded image string
        webhook_url:
          type: string
          format: uri
          description: Optional callback URL that will receive asynchronous notifications when the upscaling task completes.
        sharpen:
          type: integer
          minimum: 0
          maximum: 100
          default: 7
          description: Image sharpness intensity control. Higher values increase edge definition and clarity.
        smart_grain:
          type: integer
          minimum: 0
          maximum: 100
          default: 7
          description: Intelligent grain/texture enhancement. Higher values add more fine-grained texture.
        ultra_detail:
          type: integer
          minimum: 0
          maximum: 100
          default: 30
          description: Ultra detail enhancement level. Higher values create more intricate details.
        flavor:
          type: string
          enum: [sublime, photo, photo_denoiser]
          description: |
            Image processing flavor:
            - sublime: Optimized for artistic and illustrated images
            - photo: Optimized for photographic images
            - photo_denoiser: Specialized for photos with noise reduction
        scale_factor:
          type: integer
          minimum: 2
          maximum: 16
          description: Image scaling factor. Determines how much larger the output will be compared to input.

    SubscriptionTier:
      type: string
      description: The subscription tier level
      enum:
        - FREE
        - STANDARD
        - CREATOR
        - PRO
        - FOUNDERS_EDITION
    SubscriptionDuration:
      type: string
      description: The subscription billing duration
      enum:
        - MONTHLY
        - ANNUAL
    FeaturesResponse:
      type: object
      properties:
        partner_node_conversion_rate:
          type: number
          description: The conversion rate for partner nodes
          example: 0.5
      required:
        - partner_node_conversion_rate
    ClaimMyNodeRequest:
      type: object
      properties:
        GH_TOKEN:
          type: string
          description: GitHub token to verify if the user owns the repo of the node
      required:
        - GH_TOKEN
    BulkNodeVersionsRequest:
      type: object
      properties:
        node_versions:
          type: array
          items:
            $ref: "#/components/schemas/NodeVersionIdentifier"
          description: List of node ID and version pairs to retrieve
      required:
        - node_versions
    NodeVersionIdentifier:
      type: object
      properties:
        node_id:
          type: string
          description: The unique identifier of the node
        version:
          type: string
          description: The version of the node
      required:
        - node_id
        - version
    BulkNodeVersionsResponse:
      type: object
      properties:
        node_versions:
          type: array
          items:
            $ref: "#/components/schemas/BulkNodeVersionResult"
          description: List of retrieved node versions with their status
      required:
        - node_versions
    BulkNodeVersionResult:
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/NodeVersionIdentifier"
          description: The node and version identifier
        status:
          type: string
          enum: [success, not_found, error]
          description: Status of the retrieval operation
        node_version:
          $ref: "#/components/schemas/NodeVersion"
          description: The retrieved node version data (only present if status is success)
        error_message:
          type: string
          description: Error message if retrieval failed (only present if status is error)
      required:
        - identifier
        - status
    PersonalAccessToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the GitCommit
        name:
          type: string
          description: Required. The name of the token. Can be a simple description.
