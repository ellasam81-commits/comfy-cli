          type: array
          items:
            type: string
        style_reference_images:
          type: array
          items:
            type: string
            format: binary
    IdeogramV3ReplaceBackgroundRequest:
      type: object
      required:
        - prompt
      properties:
        image:
          type: string
          format: binary
        prompt:
          type: string
        magic_prompt:
          type: string
          enum: [AUTO, ON, OFF]
        num_images:
          type: integer
          minimum: 1
