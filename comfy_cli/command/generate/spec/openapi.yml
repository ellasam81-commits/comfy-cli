    TripoErrorResponse:
      type: object
      properties:
        code:
          type: integer
          enum:
            - 1001
            - 2000
            - 2001
            - 2002
            - 2003
            - 2004
            - 2006
            - 2007
            - 2008
            - 2010
        message:
          type: string
        suggestion:
          type: string
      required:
        - code
        - message
        - suggestion
    TripoResponseSuccessCode:
      type: integer
      description: "Standard success code for Tripo API responses. Typically 0 for success."
      example: 0
    TripoTextToModel:
      type: string
