openapi: "3.0.2"
info:
  title: Comfy API
  version: "1.0"
servers:
  - url: https://api.comfy.org
paths:
  /users:
    get:
      summary: Get information about the calling user.
      operationId: getUser
      tags:
        - Registry
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

        "404":
          description: Not Found
        "401":
          description: Unauthorized
  /customers:
    post:
      summary: Create a new customer
      description: Creates a new customer using the provided token. No request body is needed as user information is extracted from the token.
      operationId: createCustomer
      x-excluded: true
      tags:
        - API Nodes
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Customer already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "201":
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: Search for customers
      description: Search for customers by email, name, Stripe ID, or Metronome ID.
      operationId: searchCustomers
      x-excluded: true
      tags:
        - API Nodes
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: email
          schema:
            type: string
          description: Email address to search for
        - in: query
          name: name
          schema:
            type: string
          description: Customer name to search for
        - in: query
          name: stripe_id
          schema:
            type: string
          description: Stripe customer ID to search for
        - in: query
          name: metronome_id
          schema:
            type: string
          description: Metronome customer ID to search for\
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number to retrieve
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of customers to return per page
      responses:
        "200":
          description: Customers matching the search criteria
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    description: Current page number
                  limit:
                    type: integer
                    description: Number of customers per page
                  totalPages:
                    type: integer
                    description: Total number of pages available
                  customers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Customer"
                  total:
                    type: integer
                    description: Total number of matching customers
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/me:
    get:
      summary: Get authenticated customer details
      description: Returns details about the currently authenticated customer based on their JWT token.
      operationId: getAuthenticatedCustomer
      x-excluded: true
      tags:
        - API Nodes
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Customer details retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          description: Unauthorized or invalid token
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/{customer_id}:
    get:
      summary: Get a customer by ID
      description: Returns details about a customer by their ID.
      operationId: getCustomerById
      x-excluded: true
      tags:
        - API Nodes
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: "#/components/schemas/CustomerAdmin"
        "401":
          description: Unauthorized or invalid token
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/api-keys:
    get:
      summary: List all API keys for a customer
      operationId: listCustomerAPIKeys
      x-excluded: true
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKey"
        "401":
          description: Unauthorized
        "404":
          description: Customer not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a new API key for a customer
      operationId: createCustomerAPIKey
      x-excluded: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    $ref: "#/components/schemas/APIKeyWithPlaintext"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: Customer or API key not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/api-keys/{api_key_id}:
    delete:
      summary: Delete an API key for a customer
      operationId: deleteCustomerAPIKey
      x-excluded: true
      parameters:
        - in: path
          name: api_key_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: API key deleted
        "401":
          description: Unauthorized
        "404":
          description: Customer or API key not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /customers/credit:
    post:
      summary: Initiates a Credit Purchase.
      operationId: InitiateCreditPurchase
      x-excluded: true
      tags:
        - API Nodes
        - Released
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_micros:
                  type: integer
                  format: int64
                  description: the amount of the checkout transaction in micro value
                currency:
                  type: string
                  description: the currency used in the checkout transaction
              required:
                - amount_micros
                - currency
      responses:
        "201":
          description: Customer Checkout created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url:
                    type: string
                    description: the url to redirect the customer
        "400":
          description: Bad request, invalid token or user already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or invalid token
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/billing:
    post:
      summary: Access customer billing portal
      description: Creates a session for the customer to access their billing portal where they can manage subscriptions, payment methods, and view invoices.
      operationId: AccessBillingPortal
      x-excluded: true
      tags:
        - API Nodes
        - Released
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                return_url:
                  type: string
                  description: Optional URL to redirect the customer after they're done with the billing portal
                target_tier:
                  type: string
                  enum: [standard, creator, pro, standard-yearly, creator-yearly, pro-yearly]
                  description: Optional target subscription tier. When provided, creates a deep link directly to the subscription update confirmation screen with this tier pre-selected.
      responses:
        "200":
          description: Billing portal session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  billing_portal_url:
                    type: string
                    description: The URL to redirect the customer to the billing portal
        "400":
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or invalid token
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/cloud-subscription-checkout:
    post:
      summary: Create cloud subscription checkout session
      description: Creates a cloud subscription checkout session for $20/month with automatic billing
      operationId: createCloudSubscriptionCheckout
      x-excluded: true
      tags:
        - API Nodes
        - Released
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ga_client_id:
                  type: string
                  description: Google Analytics client ID from _ga cookie
                ga_session_id:
                  type: string
                  description: Google Analytics session ID
                ga_session_number:
                  type: string
                  description: Google Analytics session number
                gclid:
                  type: string
                  description: Google Ads click ID
                gbraid:
                  type: string
                  description: Google Ads iOS attribution parameter
                wbraid:
                  type: string
                  description: Google Ads web-to-app attribution parameter
                utm_source:
                  type: string
                  description: UTM source parameter
                utm_medium:
                  type: string
                  description: UTM medium parameter
                utm_campaign:
                  type: string
                  description: UTM campaign parameter
                utm_term:
                  type: string
                  description: UTM term parameter
                utm_content:
                  type: string
                  description: UTM content parameter
                im_ref:
                  type: string
                  description: Impact.com click ID for affiliate conversion tracking
      responses:
        "201":
          description: Subscription checkout session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url:
                    type: string
                    description: The URL to redirect the customer to complete subscription
        "400":
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or invalid token
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/cloud-subscription-checkout/{tier}:
    post:
      summary: Create cloud subscription checkout session for a specific tier
      description: Creates a cloud subscription checkout session for a specific subscription tier (standard, creator, or pro) with automatic billing
      operationId: createCloudSubscriptionCheckoutTier
      x-excluded: true
      tags:
        - API Nodes
        - Released
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: tier
          required: true
          description: The subscription tier (standard, creator, or pro) with optional yearly billing (standard-yearly, creator-yearly, pro-yearly)
          schema:
            type: string
            enum:
              - standard
              - creator
              - pro
              - standard-yearly
              - creator-yearly
              - pro-yearly
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ga_client_id:
                  type: string
                  description: Google Analytics client ID from _ga cookie
                ga_session_id:
                  type: string
                  description: Google Analytics session ID
                ga_session_number:
                  type: string
                  description: Google Analytics session number
                gclid:
                  type: string
                  description: Google Ads click ID
                gbraid:
                  type: string
                  description: Google Ads iOS attribution parameter
                wbraid:
                  type: string
                  description: Google Ads web-to-app attribution parameter
                utm_source:
                  type: string
                  description: UTM source parameter
                utm_medium:
                  type: string
                  description: UTM medium parameter
                utm_campaign:
                  type: string
                  description: UTM campaign parameter
                utm_term:
                  type: string
                  description: UTM term parameter
                utm_content:
                  type: string
                  description: UTM content parameter
                im_ref:
                  type: string
                  description: Impact.com click ID for affiliate conversion tracking
      responses:
        "201":
          description: Subscription checkout session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url:
                    type: string
                    description: The URL to redirect the customer to complete subscription
        "400":
          description: Bad request, invalid input or tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or invalid token
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/cloud-subscription-status:
    get:
      summary: Check cloud subscription status
      description: Check if the customer has an active cloud subscription
      operationId: GetCloudSubscriptionStatus
      x-excluded: true
      tags:
        - API Nodes
        - Released
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Cloud subscription status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_active:
                    type: boolean
                    description: Whether the customer has an active cloud subscription
                  subscription_id:
                    type: string
                    description: The active subscription ID if one exists
                    nullable: true
                  subscription_tier:
                    allOf:
                      - $ref: "#/components/schemas/SubscriptionTier"
                    nullable: true
                  subscription_duration:
                    allOf:
                      - $ref: "#/components/schemas/SubscriptionDuration"
                    nullable: true
                  has_fund:
                    type: boolean
                    description: Whether the customer has funds/credits available
                  renewal_date:
                    type: string
                    format: date-time
                    description: The next renewal date for the subscription (ISO 8601 format)
                    nullable: true
                  end_date:
                    type: string
                    format: date-time
                    description: The date when the subscription is set to end (ISO 8601 format)
                    nullable: true
        "401":
          description: Unauthorized or invalid token
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/verify-api-key:
    post:
      summary: Verify a ComfyUI API key and return customer details
      description: |
        Validates a ComfyUI API key and returns the associated customer information.
        This endpoint is used by cloud.comfy.org to authenticate users via API keys
        instead of Firebase tokens.
      operationId: VerifyApiKey
      x-excluded: true
      tags:
        - Admin
      parameters:
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema:
            type: string
          description: Admin API secret used to authorize this request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                  description: The ComfyUI API key to verify (e.g., comfy_xxx...)
              required:
                - api_key
      responses:
        "200":
          description: API key is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Whether the API key is valid
                  firebase_uid:
                    type: string
                    description: The Firebase UID of the user
                  email:
                    type: string
                    description: The customer's email address
                  name:
                    type: string
                    description: The customer's name
                  is_admin:
                    type: boolean
                    description: Whether the customer is an admin
                required:
                  - valid
                  - firebase_uid
        "401":
          description: Unauthorized or missing admin API secret
        "403":
          description: API key auth not allowed for this account (e.g., free tier)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API key not found or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/generate-token:
    post:
      summary: Generate a short-lived JWT admin token
      description: |
        Generates a short-lived JWT admin token for browser-based admin operations.
        The user must already be authenticated with Firebase and have admin privileges.
        The generated token expires after 1 hour.
      operationId: GenerateAdminToken
      tags:
        - Admin
      security:
        - BearerAuth: []
      responses:
        "200":
          description: JWT token generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: The JWT admin token
                  expires_at:
                    type: string
                    format: date-time
                    description: When the token expires
                required:
                  - token
                  - expires_at
        "401":
          description: Unauthorized or user is not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers/{customer_id}/cloud-subscription-status:
    get:
      summary: Admin check cloud subscription status
      description: Allows an admin to inspect a specific customer's cloud subscription status.
      operationId: GetAdminCustomerCloudSubscriptionStatus
      x-excluded: true
      tags:
        - Admin
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
          description: The ID of the customer whose subscription status to retrieve
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema:
            type: string
          description: Admin API secret used to authorize this request
      responses:
        "200":
          description: Cloud subscription status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_active:
                    type: boolean
                    description: Whether the customer has an active cloud subscription
                  subscription_id:
                    type: string
                    description: The active subscription ID if one exists
                    nullable: true
                  subscription_tier:
                    allOf:
                      - $ref: "#/components/schemas/SubscriptionTier"
                    nullable: true
                  subscription_duration:
                    allOf:
                      - $ref: "#/components/schemas/SubscriptionDuration"
                    nullable: true
                  has_fund:
                    type: boolean
                    description: Whether the customer has funds/credits available
                  renewal_date:
                    type: string
                    format: date-time
                    description: The next renewal date for the subscription (ISO 8601 format)
                    nullable: true
                  end_date:
                    type: string
                    format: date-time
                    description: The date when the subscription is set to end (ISO 8601 format)
                    nullable: true
        "401":
          description: Unauthorized or missing admin API secret
        "404":
          description: Customer not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers/{customer_id}/balance:
    get:
      summary: Admin get customer's remaining balance
      description: Returns the specified customer's current remaining balance in microamount and its currency.
      operationId: GetAdminCustomerBalance
      x-excluded: true
      tags:
        - Admin
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer balance retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  amount_micros:
                    type: number
                    format: double
                  prepaid_balance_micros:
                    type: number
                    format: double
                  cloud_credit_balance_micros:
                    type: number
                    format: double
                  pending_charges_micros:
                    type: number
                    format: double
                  effective_balance_micros:
                    type: number
                    format: double
                  currency:
                    type: string
                required:
                  - amount_micros
                  - currency
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers/{customer_id}/stripe-data:
    delete:
      summary: Delete customer Stripe data
      description: Deletes the Stripe customer data associated with the given customer ID.
      operationId: DeleteAdminCustomerStripeData
      x-excluded: true
      tags:
        - Admin
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
          description: The ID of the customer whose Stripe data to delete
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema:
            type: string
          description: Admin API secret used to authorize this request
      responses:
        "200":
          description: Stripe data deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Success message
        "400":
          description: Bad request - missing required parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or missing admin API secret
        "404":
          description: Customer not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers/{customer_id}/archive-metronome-data:
    post:
      summary: Archive customer Metronome data
      description: Archives metronome data. See https://docs.metronome.com/api-reference/customers/archive-a-customer
      operationId: PostAdminArchiveMetronomeData
      x-excluded: true
      tags:
        - Admin
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
          description: The ID of the customer whose Metronome data to archive
        - in: header
          name: X-Comfy-Admin-Secret
          required: true
          schema:
            type: string
          description: Admin API secret used to authorize this request
      responses:
        "200":
          description: Metronome data archived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Success message
        "400":
          description: Bad request - missing required parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized or missing admin API secret
        "404":
          description: Customer not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/usage:
    post:
      summary: Get customer's usage
      description: Returns the customer's as a dashboard URL.
      operationId: GetCustomerUsage
      x-excluded: true
      tags:
        - API Nodes
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dashboard_type:
                  type: string
                  description: The type of dashboard to retrieve
                  enum:
                    - invoices
                    - usage
                    - credits
                    - commits_and_credits
                  default: usage
                color_overrides:
                  type: array
                  description: Optional list of colors to override for branding
                  items:
                    type: object
                    required:
                      - name
                      - value
                    properties:
                      name:
                        type: string
                        description: The color property to override
                        enum:
                          - Gray_dark
                          - Gray_medium
                          - Gray_light
                          - Gray_extralight
                          - White
                          - Primary_medium
                          - Primary_light
                          - UsageLine_0
                          - UsageLine_1
                          - UsageLine_2
                          - UsageLine_3
                          - UsageLine_4
                          - UsageLine_5
                          - UsageLine_6
                          - UsageLine_7
                          - UsageLine_8
