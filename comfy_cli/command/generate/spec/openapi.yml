    BytePlusImageGenerationRequest:
      type: object
      properties:
        model:
          type: string
          enum:
            - seedream-3-0-t2i-250415
            - seededit-3-0-i2i-250628
            - seedream-4-0-250828
            - seedream-4-5-251128
            - seedream-5-0-260128
        prompt:
          type: string
          description: Text description for image generation or transformation
        image:
          oneOf:
            - type: string
              description: Single image (URL or Base64)
            - type: array
              items:
                type: string
              maxItems: 14
              description: Multiple images (URLs or Base64) - supported by seedream-5.0-lite, 4.5 and 4.0
          description: |
            Seedream-5.0-lite, 4.5 and 4.0, and seededit-3.0-i2i support this parameter.

            Enter the Base64 encoding or an accessible URL of the image to edit. Seedream-5.0-lite, 4.5 and 4.0 support inputting a single image or multiple images (see the multi-image blending example), while seededit-3.0-i2i only supports single-image input.

            • Image URL: Make sure that the image URL is accessible.
            • Base64 encoding: The format must be data:image/<image format>;base64,<Base64 encoding>. Note: <image format> must be in lowercase, e.g., data:image/png;base64,<base64_image>.

            An input image must meet the following requirements:
            • Image format: jpeg, png (seedream-5.0-lite, 4.5 and 4.0 also support webp, bmp, tiff and gif)
            • Aspect ratio (width/height): In the range [1/16, 16] for seedream-5.0-lite, 4.5 and 4.0; [1/3, 3] for seededit-3.0-i2i
            • Width and height (px): > 14
            • Size: No more than 10 MB
            • Maximum of 14 reference images
        size:
          type: string
          description: |
            "seedream-3-0-t2i-250415": Specifies the dimensions (width x height in pixels) of the generated image. Must be between [512x512, 2048x2048]
            "seededit-3-0-i2i-250628": The width and height pixels of the generated image. Currently only supports adaptive.
            "seedream-4-0-250828": Set the specification for the generated image. Two methods are available but cannot be used together.
              Method 1 | Specify the resolution. Optional values: 1K, 2K, 4K
              Method 2 | Specify width and height in pixels. Default: 2048x2048, total pixels: [1024x1024, 4096x4096], aspect ratio: [1/16, 16]
            "seedream-4-5-251128": Two methods available.
              Method 1 | Specify the resolution. Optional values: 2K, 4K
              Method 2 | Specify width and height in pixels. Default: 2048x2048, total pixels: [2560x1440, 4096x4096], aspect ratio: [1/16, 16]
            "seedream-5-0-260128": Two methods available.
              Method 1 | Specify the resolution. Optional values: 2K, 3K
              Method 2 | Specify width and height in pixels. Default: 2048x2048, total pixels: [2560x1440, ~3072x3072], aspect ratio: [1/16, 16]
        response_format:
          type: string
          enum:
            - url
            - b64_json
          description: Specifies the format of the generated image returned in the response
          default: "url"
        seed:
          type: integer
          description: "Random seed to control the stochasticity of image generation. Range: [-1, 2147483647]. If not specified, a seed will be automatically generated. To reproduce the same output, use the same seed value."
          default: -1
        sequential_image_generation:
          type: string
          description: |
            Controls whether to disable the batch generation feature. This parameter is only supported on seedream-5.0-lite, 4.5 and 4.0. Valid values:
            auto: In automatic mode, the model automatically determines whether to return multiple images and how many images it will contain based on the user's prompt.
            disabled: Disables batch generation feature. The model will only generate one image.
        sequential_image_generation_options:
          type: object
          description: |
            Only seedream-5.0-lite, 4.5 and 4.0 support this parameter.
            Configuration for the batch image generation feature. This parameter is only effective when sequential_image_generation is set to auto.
          properties:
            max_images:
              type: integer
              description: "Specifies the maximum number of images to generate in this request. Number of input reference images + Number of generated images ≤ 15."
              minimum: 1
              maximum: 15
              default: 15
        guidance_scale:
          type: number
          format: float
          description: "Controls how closely the output image aligns with the input prompt. Range [1, 10]. Higher values result in stronger prompt adherence. Default 2.5 for seedream-3-0-t2i-250415 and 5.5 for seededit-3-0-i2i-250628. Not supported by seedream-5.0-lite, 4.5 and 4.0."
          minimum: 1
          maximum: 10
        watermark:
          type: boolean
          description: "Specifies whether to add a watermark to the generated image. false = No watermark, true = Adds watermark with 'AI generated' label"
          default: true
        output_format:
          type: string
          enum:
            - png
            - jpeg
          description: "Specifies the format of the output image. Only seedream-5.0-lite supports this parameter."
          default: "jpeg"
        stream:
          type: boolean
          description: "Whether to enable streaming output mode. Only seedream-5.0-lite, 4.5 and 4.0 support this parameter. false = All output images are returned at once. true = Each output image is returned immediately after generated."
          default: false
        optimize_prompt_options:
          type: object
          description: |
            Configuration for prompt optimization feature. Only seedream-5.0-lite/4.5 (only supports standard mode) and seedream-4.0 support this parameter.
          properties:
            mode:
              type: string
              enum:
                - standard
                - fast
              description: "Set the mode for the prompt optimization feature. standard = Higher quality, longer generation time. fast = Faster but at a more average quality."
              default: "standard"
      required:
        - prompt
        - model
    BytePlusImageGenerationResponse:
      type: object
      properties:
        model:
          type: string
          description: The model ID used for the request
          example: "seedream-3-0-t2i-250415"
        created:
          type: integer
          description: Unix timestamp (in seconds) indicating the time when the request was created
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
                description: URL for image download (if response_format is "url")
              b64_json:
                type: string
                description: Base64-encoded image data (if response_format is "b64_json")
              size:
                type: string
                description: "The width and height of the image in pixels, in the format <width>x<height>. Only seedream-5.0-lite, 4.5 and 4.0 support this parameter."
          description: Contains information about the generated image(s)
        usage:
          type: object
          properties:
            generated_images:
              type: integer
              description: Number of images generated by the model
            output_tokens:
              type: integer
              description: The number of tokens used for the picture generated by the model.
            total_tokens:
              type: integer
              description: The total number of tokens consumed by this request.
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
            message:
              type: string
              description: Error message
          description: Error information (if any)
    BytePlusVideoGenerationRequest:
      type: object
      properties:
        model:
          type: string
          description: The ID of the model to call. Available models include seedance-1-5-pro-251215, seedance-1-0-pro-250528, seedance-1-0-pro-fast-251015, seedance-1-0-lite-t2v-250428, seedance-1-0-lite-i2v-250428
          enum:
            - seedance-1-5-pro-251215
            - seedance-1-0-pro-250528
            - seedance-1-0-lite-t2v-250428
            - seedance-1-0-lite-i2v-250428
            - seedance-1-0-pro-fast-251015
        content:
          type: array
          description: The input content for the model to generate a video
          items:
            $ref: "#/components/schemas/BytePlusVideoGenerationContent"
          minItems: 1
        callback_url:
          type: string
          format: uri
          description: Callback notification address for the result of this generation task
        return_last_frame:
          type: boolean
          default: false
          description: |
            Whether to return the last frame image of the generated video.
            true: Returns the last frame image of the generated video. After setting this parameter to true, you can obtain the last frame image by calling the Querying the information about a video generation task. The last frame image is in PNG format, with its pixel width and height consistent with those of the generated video, and it contains no watermarks. Using this parameter allows the generation of multiple consecutive videos: the last frame of the previously generated video is used as the first frame of the next video task, enabling quick generation of multiple consecutive videos.
            false: Does not return the last frame image of the generated video.
        generate_audio:
          type: boolean
          default: true
          description: |
            Only supported by Seedance 1.5 pro. Whether the generated video includes audio synchronized with the visuals.
            true: The model outputs a video with synchronized audio. Seedance 1.5 pro can automatically generate matching voice, sound effects, or background music based on the prompt and visual content. It is recommended to enclose dialogue in double quotes. Example: A man stops a woman and says, "Remember, never point your finger at the moon."
            false: The model outputs a silent video.
      required:
        - model
        - content
    BytePlusVideoGenerationContent:
      type: object
      properties:
        type:
          type: string
          enum:
          - text
          - image_url
          description: The type of the input content
        text:
          type: string
          description: |
            The input text information for the model. Includes text prompt and optional parameters.

            Text prompt (required): Description of the video to be generated using Chinese and English characters.

            Parameters (optional): Add --[parameters] after the text prompt to control video specifications:
            - --resolution (--rs): 480p, 720p, 1080p (default: 720p)
            - --ratio (--rt): 21:9, 16:9, 4:3, 1:1, 3:4, 9:16, 9:21, adaptive (default: 16:9 or adaptive)
            - --duration (--dur): 3-12 seconds (default: 5)
            - --framepersecond (--fps): 24 (default: 24)
            - --watermark (--wm): true/false (default: false)
            - --seed (--seed): -1 to 2^32-1 (default: -1)
            - --camerafixed (--cf): true/false (default: false)

            Example: "A beautiful landscape --ratio 16:9 --resolution 720p --duration 5"
          maxLength: 4096
        image_url:
          type: object
          properties:
            url:
              type: string
              description: |
                Image content for image-to-video generation (when type is "image")
                Image URL: Make sure that the image URL is accessible.
                Base64-encoded content: Format must be data:image/<format>;base64,<content>
      required:
        - type
    BytePlusVideoGenerationResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the video generation task
      required:
        - id
    BytePlusVideoGenerationQueryResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the video generation task
        model:
          type: string
          description: The name and version of the model used by the task
        status:
          type: string
          enum:
            - queued
            - running
            - cancelled
            - succeeded
            - failed
          description: The state of the task
        error:
          type: object
          nullable: true
          description: The error information. If the task succeeds, null is returned. If the task fails, the error information is returned.
          properties:
            code:
              type: string
              description: The error code
            message:
              type: string
              description: The error message
        created_at:
          type: integer
          description: The time when the task was created. The value is a UNIX timestamp in seconds.
        updated_at:
          type: integer
          description: The time when the task was last updated. The value is a UNIX timestamp in seconds.
        content:
          type: object
          description: The output after the video generation task is completed, which contains the download URL of the output video.
          properties:
            video_url:
              type: string
              description: The URL of the output video. For security purposes, the output video is cleared after 24 hours.
        usage:
          type: object
          description: The token usage for the request
          properties:
            completion_tokens:
              type: integer
              description: The number of tokens generated by the model
            total_tokens:
              type: integer
              description: For the video generation model, the number of input tokens is not calculated and defaults to 0. Therefore, total_tokens = completion_tokens.
    WanVideoGenerationRequest:
      type: object
      properties:
        model:
          type: string
          description: The ID of the model to call
          enum:
            - wan2.5-t2v-preview
            - wan2.5-i2v-preview
            - wan2.6-t2v
            - wan2.6-i2v
            - wan2.6-r2v
        input:
          type: object
          description: Enter basic information, such as prompt words, etc.
          properties:
            prompt:
              type: string
              description: |
                Text prompt words. Support Chinese and English, length not exceeding 800 characters.
                For wan2.6-r2v with multiple reference videos, use 'character1', 'character2', etc. to refer to subjects
                in the order of reference videos. Example: "Character1 sings on the roadside, Character2 dances beside it"
              maxLength: 800
            negative_prompt:
              type: string
              description: Reverse prompt words are used to describe content that you do not want to see in the video screen
              maxLength: 500
            audio_url:
              type: string
              description: "Audio file download URL. Supported formats: mp3 and wav. Cannot be used with reference_video_urls."
            img_url:
              type: string
              description: "First frame image URL or Base64 encoded data. Required for I2V models. Image formats: JPEG, JPG, PNG, BMP, WEBP. Resolution: 360-2000 pixels. File size: max 10MB."
            template:
              type: string
              description: "Video effect template name. Optional. Currently supported: squish, flying, carousel. When used, prompt parameter is ignored."
            reference_video_urls:
              type: array
              description: |
                Reference video URLs for wan2.6-r2v model only. Array of 1-3 video URLs.
                Input restrictions:
                - Format: mp4, mov
                - Quantity: 1-3 videos
                - Single video length: 2-30 seconds
                - Single file size: max 30MB
                - Cannot be used with audio_url
                Reference duration: Single video max 5s, two videos max 2.5s each, three videos proportionally less.
                Billing: Based on actual reference duration used.
              items:
                type: string
              minItems: 1
              maxItems: 3
          required:
            - prompt
        parameters:
          type: object
          description: Video processing parameters
          properties:
            size:
              type: string
              description: |
                Video resolution in format width*height. Supported resolutions vary by model:
                For wan2.5 T2V: 480P (480*832, 832*480, 624*624), 720P, 1080P sizes
                For wan2.6 T2V/R2V (no 480P):
                  720P: 1280*720, 720*1280, 960*960, 1088*832, 832*1088
                  1080P: 1920*1080, 1080*1920, 1440*1440, 1632*1248, 1248*1632
            resolution:
              type: string
              description: |
                Resolution level for I2V models. Supported values vary by model:
                - wan2.5-i2v-preview: 480P, 720P, 1080P
                - wan2.6-i2v: 720P, 1080P only (no 480P support)
              enum:
                - "480P"
                - "720P"
                - "1080P"
            duration:
              type: integer
              description: |
                The duration of the video generated, in seconds:
                - wan2.5 models: 5 or 10 seconds
                - wan2.6-t2v, wan2.6-i2v: 5, 10, or 15 seconds
                - wan2.6-r2v: 5 or 10 seconds only (no 15s support)
              enum: [5, 10, 15]
              default: 5
            prompt_extend:
              type: boolean
              description: Is it enabled prompt intelligent rewriting. Default is true
              default: true
            shot_type:
              type: string
              description: |
                Intelligent multi-lens control. Only active when prompt_extend is enabled.
                For wan2.6 models only.
                - multi: Intelligent disassembly into multiple lenses (default)
                - single: Single lens generation
              enum:
                - multi
                - single
              default: multi
            seed:
              type: integer
              description: Random number seed, used to control the randomness of the model generated content
              minimum: 0
              maximum: 2147483647
            watermark:
              type: boolean
              description: Whether to add a watermark logo, the watermark is located in the lower right corner
              default: false
            audio:
              type: boolean
              description: Whether to add audio to the video
              default: true
      required:
        - model
        - input
    WanVideoGenerationResponse:
      type: object
