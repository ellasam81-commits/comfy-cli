              url:
                type: string
                description: URL of the image
              revised_prompt:
                type: string
                description: Revised prompt
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            input_tokens_details:
              type: object
              properties:
                text_tokens:
                  type: integer
                image_tokens:
                  type: integer
            output_tokens:
              type: integer
            output_tokens_details:
              type: object
              properties:
                text_tokens:
                  type: integer
                image_tokens:
                  type: integer
            total_tokens:
              type: integer
    OpenAIImageGenerationRequest:
      type: object
      required:
        - prompt
      properties:
        model:
          type: string
          description: The model to use for image generation
          example: "dall-e-3"
        prompt:
          type: string
          description: A text description of the desired image
          example: "Draw a rocket in front of a blackhole in deep space"
        n:
          type: integer
          description: The number of images to generate (1-10). Only 1 supported for dall-e-3.
          example: 1
        quality:
          type: string
          description: The quality of the generated image
          enum: [low, medium, high, standard, hd]
          example: "high"
        size:
          type: string
          description: Size of the image (e.g., 1024x1024, 1536x1024, auto)
          example: "1024x1536"
        output_format:
          type: string
          description: Format of the output image
          enum: [png, webp, jpeg]
          example: "png"
        output_compression:
          type: integer
          description: Compression level for JPEG or WebP (0-100)
          example: 100
        moderation:
          type: string
          description: Content moderation setting
          enum: [low, auto]
          example: "auto"
        background:
          type: string
          description: Background transparency
          enum: [transparent, opaque]
          example: "opaque"
        response_format:
          type: string
          description: Response format of image data
          enum: [url, b64_json]
          example: "b64_json"
        style:
          type: string
          description: Style of the image (only for dall-e-3)
          enum: [vivid, natural]
          example: "vivid"
        user:
          type: string
          description: A unique identifier for end-user monitoring
          example: "user-1234"
