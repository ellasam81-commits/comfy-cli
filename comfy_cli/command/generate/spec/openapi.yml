    TripoTypeStylizeModel:
      type: string
      enum:
        - stylize_model
    TripoStylizeOptions:
      type: string
      enum:
        - lego
        - voxel
        - voronoi
        - minecraft
    TripoTypeConvertModel:
      type: string
