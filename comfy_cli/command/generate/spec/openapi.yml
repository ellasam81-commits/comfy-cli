            type: string
            default: image/*
            description: >-
              Specify `image/*` to receive the bytes of the image directly. Otherwise specify `application/json` to receive the image as base64 encoded JSON.
            enum:
              - image/*
              - application/json
          required: false
          name: accept
          in: header
        - schema:
            $ref: "#/components/schemas/StabilityStabilityClientID"
