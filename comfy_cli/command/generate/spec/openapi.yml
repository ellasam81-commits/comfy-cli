        type:
          type: string
          enum:
            - image
          default: image
        url:
          type: string
          format: uri
          description: The URL of the image
      required:
        - type
        - url
      example:
        type: image
        url: "https://example.com/image.jpg"
    LumaKeyframe:
      oneOf:
        - $ref: "#/components/schemas/LumaGenerationReference"
        - $ref: "#/components/schemas/LumaImageReference"
