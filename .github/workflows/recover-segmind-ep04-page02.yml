name: Recover Segmind EP04 Page02 Result

on:
  push:
    branches:
      - agent/segmind-ep02-consistency-test
    paths:
      - storyboard-tests/recover-ep04-page02.run

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install HTTP client
        run: python -m pip install requests

      - name: Recover existing request without submitting a new generation
        env:
          SEGMIND_API_KEY: ${{ secrets.SEGMIND_API_KEY }}
        run: |
          mkdir -p output
          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path
          from urllib.parse import urlparse

          import requests

          request_id = "b4e570c11a630df770151a7ad928e0d1"
          base = f"https://api.segmind.com/v2/requests/{request_id}"
          headers = {"x-api-key": os.environ["SEGMIND_API_KEY"]}
          output = Path("output")
          observations = []

          def collect_urls(value, found):
              if isinstance(value, str) and value.startswith(("https://", "http://")):
                  found.append(value)
              elif isinstance(value, list):
                  for child in value:
                      collect_urls(child, found)
              elif isinstance(value, dict):
                  for child in value.values():
                      collect_urls(child, found)

          result = None
          for attempt in range(60):
              response = requests.get(base + "/status", headers=headers, timeout=30)
              try:
                  body = response.json()
              except ValueError:
                  body = {"text": response.text[:500]}
              observations.append({"attempt": attempt + 1, "code": response.status_code, "body": body})
              state = body.get("status") if isinstance(body, dict) else None
              print("poll", attempt + 1, response.status_code, state)
              if state == "COMPLETED":
                  final_response = requests.get(base, headers=headers, timeout=60)
                  final_response.raise_for_status()
                  result = final_response.json()
                  break
              if state == "FAILED":
                  raise RuntimeError(f"Original Segmind request failed: {body}")
              time.sleep(10)

          (output / "recovery-observations.json").write_text(
              json.dumps(observations, indent=2, ensure_ascii=False), encoding="utf-8"
          )
          if result is None:
              raise RuntimeError("Existing request could not be recovered; no new request was submitted.")

          (output / "result.json").write_text(
              json.dumps(result, indent=2, ensure_ascii=False), encoding="utf-8"
          )
          urls = []
          collect_urls(result.get("output", result), urls)
          urls = list(dict.fromkeys(urls))
          if not urls:
              raise RuntimeError("Recovered result contains no output URL.")

          saved = []
          for index, url in enumerate(urls, start=1):
              response = requests.get(url, timeout=300)
              response.raise_for_status()
              suffix = Path(urlparse(url).path).suffix.lower()
              if response.content[4:8] == b"ftyp":
                  suffix = ".mp4"
              elif not suffix:
                  suffix = ".bin"
              path = output / f"ep04-page02-recovered-{index}{suffix}"
              path.write_bytes(response.content)
              saved.append(path.name)
          print("Recovered:", saved)
          PY

      - name: Upload recovery result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ep04-page02-recovered
          path: output/*
          if-no-files-found: warn
          retention-days: 14
