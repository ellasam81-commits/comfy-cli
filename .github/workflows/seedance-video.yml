name: Generate Seedance Video

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Describe the video you want
        required: true
        type: string
      image:
        description: Optional public image URL or repository file path
        required: false
        type: string
      model:
        description: Seedance model
        required: true
        default: seedance-1-0-lite-t2v-250428
        type: choice
        options:
          - seedance-1-0-lite-t2v-250428
          - seedance-1-0-lite-i2v-250428
          - seedance-1-0-pro-fast-251015
          - seedance-1-0-pro-250528
          - seedance-1-5-pro-251215
      duration:
        description: Video length in seconds
        required: true
        default: "3"
        type: choice
        options:
          - "3"
          - "5"
          - "8"
          - "10"
          - "12"
      resolution:
        description: Output resolution
        required: true
        default: 480p
        type: choice
        options:
          - 480p
          - 720p
          - 1080p
      ratio:
        description: Video shape
        required: true
        default: "9:16"
        type: choice
        options:
          - "9:16"
          - "16:9"
          - "1:1"
          - "3:4"
          - "4:3"
      generate_audio:
        description: Generate audio (Seedance 1.5 Pro only)
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Comfy CLI
        run: python -m pip install "comfy-cli==1.12.0"

      - name: Generate video
        shell: bash
        env:
          COMFY_API_KEY: ${{ secrets.COMFY_API_KEY }}
          VIDEO_PROMPT: ${{ inputs.prompt }}
          IMAGE_INPUT: ${{ inputs.image }}
          SEEDANCE_MODEL: ${{ inputs.model }}
          VIDEO_DURATION: ${{ inputs.duration }}
          VIDEO_RESOLUTION: ${{ inputs.resolution }}
          VIDEO_RATIO: ${{ inputs.ratio }}
          GENERATE_AUDIO: ${{ inputs.generate_audio }}
        run: |
          set -euo pipefail

          if [[ -z "$COMFY_API_KEY" ]]; then
            echo "::error::COMFY_API_KEY is missing from repository Actions secrets."
            exit 1
          fi

          if [[ "$GENERATE_AUDIO" == "true" && "$SEEDANCE_MODEL" != "seedance-1-5-pro-251215" ]]; then
            echo "::error::Audio generation requires seedance-1-5-pro-251215."
            exit 1
          fi

          mkdir -p output

          args=(
            seedance
            --prompt "$VIDEO_PROMPT"
            --model "$SEEDANCE_MODEL"
            --resolution "$VIDEO_RESOLUTION"
            --ratio "$VIDEO_RATIO"
            --duration "$VIDEO_DURATION"
            --fps 24
            --seed -1
            --return_last_frame true
            --download "output/seedance-{request_id}-{index}.{ext}"
            --timeout 900
          )

          if [[ -n "$IMAGE_INPUT" ]]; then
            if [[ "$IMAGE_INPUT" =~ ^https?:// ]] || [[ -f "$IMAGE_INPUT" ]]; then
              args+=(--image "$IMAGE_INPUT")
            else
              echo "::error::Image must be a public URL or an existing repository file path."
              exit 1
            fi
          fi

          if [[ "$GENERATE_AUDIO" == "true" ]]; then
            args+=(--generate_audio true)
          fi

          comfy generate "${args[@]}"

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: seedance-video-${{ github.run_number }}
          path: output/*
          if-no-files-found: error
          retention-days: 7
