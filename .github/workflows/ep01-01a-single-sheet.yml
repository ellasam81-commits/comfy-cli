name: EP01 01A - Final with Segmind audio

on:
  push:
    branches: [main]
    paths:
      - storyboard-tests/ep01-current/RUN_EP01_01A.txt

permissions:
  contents: read

concurrency:
  group: ep01-current-01a-final-attempt2
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out locked inputs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate paid trigger
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          TRIGGER: storyboard-tests/ep01-current/RUN_EP01_01A.txt
          IMAGE: storyboard-tests/ep01-current/01A-storyboard.jpeg.b64
          WORKFLOW: .github/workflows/ep01-01a-single-sheet.yml
        run: |
          set -euo pipefail
          git cat-file -e "$BEFORE_SHA:$WORKFLOW"
          git cat-file -e "$BEFORE_SHA:$IMAGE"
          mapfile -t changed < <(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
          [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$TRIGGER" ]]
          [[ "$(cat "$TRIGGER")" == "GENERATE EP01 01A FINAL ONCE" ]]

      - name: Restore exact authorized Image 1
        run: |
          mkdir -p input output
          base64 --decode storyboard-tests/ep01-current/01A-storyboard.jpeg.b64 > input/01A-storyboard.jpeg
          echo "c99ae3fc733fd1fac3e3f91d762422d737c58aa46afaab786ddc6936ff202e2d  input/01A-storyboard.jpeg" | sha256sum --check --strict

      - name: Check immutable final-attempt lock
        id: paid-lock
        uses: actions/cache/restore@v4
        with:
          path: output/paid-lock
          key: segmind-ep01-current-01a-final-attempt2-v1
          lookup-only: true

      - name: Validate secret and lock
        env:
          SEGMIND_API_KEY: ${{ secrets.SEGMIND_API_KEY }}
          LOCK_HIT: ${{ steps.paid-lock.outputs.cache-hit }}
        run: |
          [[ -n "$SEGMIND_API_KEY" ]] || { echo "::error::Missing SEGMIND_API_KEY; no paid request made"; exit 2; }
          [[ "$LOCK_HIT" != "true" ]] || { echo "::error::Final attempt already used; refusing resubmission"; exit 2; }

      - name: Arm immutable final-attempt lock
        run: |
          mkdir -p output/paid-lock
          echo "armed by run $GITHUB_RUN_ID" > output/paid-lock/armed.txt

      - name: Save immutable final-attempt lock
        uses: actions/cache/save@v4
        with:
          path: output/paid-lock
          key: segmind-ep01-current-01a-final-attempt2-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install proven Segmind client
        run: python -m pip install "segmind==1.1.0" requests

      - name: Submit exactly one paid generation
        id: generation
        continue-on-error: true
        env:
          SEGMIND_API_KEY: ${{ secrets.SEGMIND_API_KEY }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import urlparse
          import requests
          from segmind import SegmindClient

          out = Path("output")
          state_path = out / "01a-status.json"
          state = {
              "state": "starting", "episode": "EP01", "segment": "01A",
              "attempt": 2, "automatic_retries": 0,
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "settings": {"model":"seedance-2.0-mini","duration":15,"resolution":"480p","aspect_ratio":"9:16","bitrate_mode":"high","generate_audio":True,"seed":1701,"reference_images":1},
              "started_at": datetime.now(timezone.utc).isoformat(),
          }
          def save(): state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")
          def urls(value, found):
              if isinstance(value, str) and value.startswith(("https://", "http://")): found.append(value)
              elif isinstance(value, list):
                  for child in value: urls(child, found)
              elif isinstance(value, dict):
                  for child in value.values(): urls(child, found)
          def ext(data, content_type, url):
              suffix = Path(urlparse(url).path).suffix.lower()
              if "video/mp4" in content_type or data[4:8] == b"ftyp": return ".mp4"
              if "image/png" in content_type or data.startswith(b"\x89PNG"): return ".png"
              if "image/jpeg" in content_type or data.startswith(b"\xff\xd8\xff"): return ".jpg"
              return suffix if suffix in {".mp4", ".png", ".jpg", ".jpeg"} else ".bin"

          prompt = """
          Image 1 is only a chronological storyboard and identity reference. Create one continuous
          clean full-screen 9:16 FINAL cinematic animation. Never display the storyboard sheet,
          panel grid, split screen, borders, character cards, written text, numbers, logos or
          subtitles. Subtitles will be added accurately in post.

          Preserve the same original fictional illustrated characters. Lin Qian is the tied-long-
          black-haired female investigator in fitted black field gear and gloves. Han Che is the
          short-bearded middle-aged male police captain in black uniform. Keep stable faces, hair,
          ages, outfits and proportions. Original Chinese dark 2D/2.5D forensic animation, clean
          linework, restrained painterly cel shading, adult anatomy, cold ink-blue steel palette,
          believable evidence handling, subtle micro-expressions and non-graphic horror. Do not
          copy or resemble any real public figure.

          0-2.5s: rainy midnight exterior establishing shot of a modern Chinese residential
          high-rise, restrained police-light reflections on wet pavement. Then cut immediately
          INSIDE to the seventh-floor residential corridor. Do not turn apartment 707 into the
          street-level building entrance.

          2.5-9.5s: a SINGLE inward-opening apartment door marked 707 in an indoor corridor. The
          door opens only a five-centimetre gap because a normal security chain is fastened on the
          INTERIOR face of the door. From the corridor camera, the taut inside chain is visible only
          through that narrow gap. No exterior padlock, no chain wrapped around the outside handle,
          no double door. Lin Qian examines without touching. Han Che keeps everyone back. A gloved
          forensic photographer first photographs the intact chain and scale; cutters must not
          approach before documentation.

          9.5-12s: only after the photograph is complete, bolt cutters enter through the narrow gap
          and cut the inside security chain exactly once. The door then opens inward with one quiet
          creak. Preserve evidence and do not let anyone step across the threshold.

          12-15s: flashlight reveals wet shoeprints already inside the apartment, all oriented away
          from the doorway and deeper into the dark room, with absolutely no outward prints. Hold
          the empty black doorway for the final second. No extra people crossing evidence.

          Generate synchronized audio. Natural restrained Mandarin Chinese, clear but low-key:
          Han Che at about 4s: “都别碰，先拍完整。”
          Lin Qian at about 7s: “链在里面，门只能开一条缝。”
          Han Che at about 9s: “记录完毕，剪链。”
          Lin Qian at about 12.5s: “脚印只有进去的。”
          Han Che whispers near 14s: “小心，进门。”
          Sound design: rain and distant siren outside, dry indoor corridor room tone, one camera
          shutter, light chain rattle, one metal cut, restrained door creak, faint low suspense
          pulse. No random speech, no narrator, no exaggerated screams.
          """.strip()

          try:
              client = SegmindClient()
              uploaded = client.files.upload(Path("input/01A-storyboard.jpeg"))
              refs = uploaded.get("file_urls") or []
              if len(refs) != 1: raise RuntimeError(f"Unexpected upload response: {uploaded}")
              job = client.submit_async("seedance-2.0-mini", prompt=prompt, duration=15,
                  resolution="480p", aspect_ratio="9:16", generate_audio=True,
                  bitrate_mode="high", seed=1701, return_last_frame=True,
                  reference_images=refs)
              state.update(state="processing", request_id=job.request_id)
              save()
              print("Segmind request ID:", job.request_id)
              result = job.wait(timeout=1200, interval=3.0)
              (out / "result.json").write_text(json.dumps(result, ensure_ascii=False, indent=2, default=str), encoding="utf-8")
              found = []; urls(result.get("output", result), found); found = list(dict.fromkeys(found))
              if not found: raise RuntimeError("Completed request returned no output URL")
              saved = []
              for i, url in enumerate(found, 1):
                  response = requests.get(url, timeout=300); response.raise_for_status()
                  path = out / f"EP01_01A_FINAL-{i}{ext(response.content, response.headers.get('content-type',''), url)}"
                  path.write_bytes(response.content); saved.append(path.name)
              state.update(state="completed", saved_files=saved, completed_at=datetime.now(timezone.utc).isoformat())
              save()
          except Exception as exc:
              state.update(state="failed", error=str(exc), completed_at=datetime.now(timezone.utc).isoformat())
              save(); raise
          PY

      - name: Upload video and audit state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EP01-01A-FINAL-${{ github.run_id }}
          path: |
            output/EP01_01A_FINAL-*
            output/result.json
            output/01a-status.json
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

      - name: Mark generation failure
        if: steps.generation.outcome == 'failure'
        run: exit 1
